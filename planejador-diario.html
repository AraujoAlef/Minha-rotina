<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Minha Rotina</title>
<meta name="theme-color" content="#f0c040">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rotina">
<style>
  :root {
    --bg:      #0c0c0f;
    --surface: #13131a;
    --border:  #1e1e2e;
    --text:    #e8e8f0;
    --muted:   #5a5a7a;
    --accent:  #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    padding: 20px 16px 90px;
  }

  /* HEADER */
  .header {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    text-transform: uppercase;
  }
  .logo .accent { color: var(--accent); display: block; }
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .date-box {
    text-align: right;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    line-height: 1.5;
  }
  .date-box .today { color: var(--accent); display: block; }

  /* NOTIF BTN */
  .notif-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .notif-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,192,64,0.08);
  }
  .notif-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }
  .notif-btn.active .notif-dot { animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* PROGRESS */
  .prog-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .prog-label span:last-child { color: var(--accent); }
  .prog-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f97316);
    border-radius: 4px;
    transition: width 0.8s ease;
    width: 0%;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* SECTION */
  .section-label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 12px;
    margin-top: 4px;
  }

  /* BLOCKS */
  .blocks { display: flex; flex-direction: column; gap: 8px; }

  .block {
    display: flex;
    align-items: stretch;
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    border: 1.5px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: transform 0.12s, opacity 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  .block:active { transform: scale(0.97); }
  .block.done { opacity: 0.38; }
  .block.done .b-title { text-decoration: line-through; }
  .block.is-now {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .b-stripe { width: 5px; flex-shrink: 0; }

  .b-body {
    flex: 1;
    padding: 13px 14px 13px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .b-row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .b-title {
    font-size: 15px;
    font-weight: 800;
    line-height: 1.2;
    flex: 1;
  }

  .b-time {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .b-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .b-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .b-tag {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .b-hrs {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
  }

  .now-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.35);
    border-radius: 20px;
    padding: 3px 9px;
  }
  .now-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s infinite;
  }

  /* CHECK */
  .b-check {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: transparent;
    transition: all 0.2s;
    flex-shrink: 0;
    background: transparent;
  }
  .block.done .b-check {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--bg);
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 8px;
    text-align: center;
  }
  .stat-n {
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -1px;
  }
  .stat-l {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 96px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    opacity: 0;
    transition: all 0.25s;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    font-size: 28px;
    font-weight: 900;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(240,192,64,0.45);
    z-index: 50;
    line-height: 1;
  }
  .fab:active { transform: scale(0.92); }

  /* INSTALL BANNER */
  .install-banner {
    display: none;
    background: rgba(240,192,64,0.06);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    gap: 12px;
    align-items: flex-start;
  }
  .install-banner.show { display: flex; }
  .install-text { flex: 1; font-size: 12px; line-height: 1.6; color: var(--muted); }
  .install-text strong { color: var(--accent); }
  .install-ok {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-size: 11px; font-weight: 700;
    padding: 5px 12px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }

  /* MODAL */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px 22px 0 0;
    width: 100%; max-width: 500px;
    padding: 20px 20px 44px;
    animation: up 0.22s ease;
  }
  @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .handle {
    width: 40px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    margin: 0 auto 20px;
  }
  .sheet-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 18px;
  }
  .field-label {
    display: block;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  .field {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field:focus { border-color: var(--accent); }
  textarea.field { resize: none; height: 72px; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .cat-opt {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .cat-opt.sel { border-color: #fff; transform: scale(1.18); }
  .sheet-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 800;
    font-size: 14px;
    border: none; cursor: pointer;
  }
  .btn-save   { background: var(--accent); color: var(--bg); }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-del    { background: #ef4444; color: #fff; flex: 0 0 auto; padding: 14px 16px; font-size: 18px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      Minha
      <span class="accent">Rotina</span>
    </div>
    <div class="header-right">
      <div class="date-box">
        Hoje
        <span class="today" id="cur-date"></span>
      </div>
      <button class="notif-btn" id="notif-btn" onclick="toggleNotif()">
        <div class="notif-dot"></div>
        <span id="notif-lbl">Ativar Alertas</span>
      </button>
    </div>
  </div>
  <div>
    <div class="prog-label">
      <span>Progresso do Dia</span>
      <span id="pct">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
  </div>
</div>

<div class="install-banner" id="install-banner">
  <div class="install-text">
    <strong>📲 Instalar como App</strong><br>
    Safari → <strong>⎙ Compartilhar</strong> → <strong>"Adicionar à Tela de Início"</strong>
  </div>
  <button class="install-ok" onclick="dismissInstall()">Ok</button>
</div>

<div class="legend" id="legend"></div>

<div class="section-label">Blocos de Hoje</div>
<div class="blocks" id="blocks"></div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">Feitos</div></div>
  <div class="stat"><div class="stat-n" id="s-left">0</div><div class="stat-l">Restantes</div></div>
  <div class="stat"><div class="stat-n" id="s-hrs">0h</div><div class="stat-l">Planejado</div></div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" onclick="openSheet(null)">+</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="sheet-title">Novo Bloco</div>

    <label class="field-label">Título</label>
    <input class="field" id="f-title" type="text" placeholder="Ex: Trabalhar na agência">

    <label class="field-label">Descrição</label>
    <textarea class="field" id="f-desc" placeholder="O que fazer neste bloco?"></textarea>

    <label class="field-label">Horários</label>
    <div class="time-row">
      <input class="field" id="f-start" type="time">
      <input class="field" id="f-end"   type="time">
    </div>

    <label class="field-label">Categoria</label>
    <div class="cats" id="cats"></div>

    <div class="sheet-actions">
      <button class="btn btn-del" id="btn-del" onclick="delBlock()" style="display:none">🗑</button>
      <button class="btn btn-cancel" onclick="closeSheet()">Cancelar</button>
      <button class="btn btn-save"   onclick="saveBlock()">Salvar</button>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id:'agencia',  label:'Agência',        color:'#3b82f6', emoji:'💼' },
  { id:'criativo', label:'Criativo',        color:'#a855f7', emoji:'🎨' },
  { id:'treino',   label:'Treino',          color:'#22c55e', emoji:'🏃' },
  { id:'clube',    label:'Clube Lucrando',  color:'#f97316', emoji:'💰' },
  { id:'livre',    label:'Livre',           color:'#64748b', emoji:'☕' },
];

const DEFAULTS = [
  { id:1, title:'Agência / Home Office',    desc:'Gestão de leads, atendimento, operações PrimeWay',       start:'08:00', end:'10:00', cat:'agencia',  done:false },
  { id:2, title:'Treino — Maratona Julho',  desc:'Corrida, treino de resistência ou recuperação ativa',    start:'10:00', end:'11:30', cat:'treino',   done:false },
  { id:3, title:'Criação de Artes & Vídeo', desc:'Criação de pages, criativos para afiliados, vídeos',     start:'13:00', end:'15:30', cat:'criativo', done:false },
  { id:4, title:'Afiliados / Campanhas',    desc:'Google Ads, otimização de campanhas, análise de dados',  start:'15:30', end:'17:30', cat:'agencia',  done:false },
  { id:5, title:'Clube Lucrando em Casa',   desc:'Estudo de conteúdo, implementação, tarefas do projeto',  start:'18:00', end:'19:30', cat:'clube',    done:false },
  { id:6, title:'Tempo Livre / Descanso',   desc:'Sem tela, recuperação mental, família',                  start:'20:00', end:'22:00', cat:'livre',    done:false },
];

let blocks    = JSON.parse(localStorage.getItem('rotina_v2') || 'null') || DEFAULTS;
let editId    = null;
let selCat    = 'agencia';
let notifOn   = localStorage.getItem('rotina_notif') === '1';
let timers    = [];

const persist = () => localStorage.setItem('rotina_v2', JSON.stringify(blocks));
const t2m     = t  => { if (!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; };
const nowMin  = () => { const d=new Date(); return d.getHours()*60+d.getMinutes(); };
const cat     = id => CATS.find(c=>c.id===id) || CATS[0];

function toast(msg, ms=2600) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

/* ── DATE ── */
function setDate() {
  const d    = new Date();
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const mes  = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('cur-date').textContent =
    `${dias[d.getDay()]}, ${d.getDate()} ${mes[d.getMonth()]}`;
}

/* ── LEGEND ── */
function buildLegend() {
  document.getElementById('legend').innerHTML = CATS.map(c =>
    `<div class="leg"><div class="leg-dot" style="background:${c.color}"></div>${c.emoji} ${c.label}</div>`
  ).join('');
}

/* ── RENDER ── */
function render() {
  const now = nowMin();
  const sorted = [...blocks].sort((a,b) => t2m(a.start)-t2m(b.start));

  document.getElementById('blocks').innerHTML = sorted.map(b => {
    const c     = cat(b.cat);
    const isNow = t2m(b.start) <= now && now < t2m(b.end);
    const hrs   = ((t2m(b.end)-t2m(b.start))/60).toFixed(1);
    return `
    <div class="block${b.done?' done':''}${isNow?' is-now':''}"
         onclick="toggleDone(${b.id})"
         oncontextmenu="openSheet(${b.id});return false;"
         data-id="${b.id}">
      <div class="b-stripe" style="background:${c.color}"></div>
      <div class="b-body" style="padding-right:46px">
        <div class="b-row1">
          <div class="b-title">${c.emoji} ${b.title}</div>
          <div class="b-time">${b.start}–${b.end}</div>
        </div>
        <div class="b-desc">${b.desc}</div>
        <div class="b-meta">
          <span class="b-tag" style="background:${c.color}28;color:${c.color}">${c.label}</span>
          <span class="b-hrs">${hrs}h</span>
          ${isNow?'<span class="now-badge"><div class="now-dot"></div>Agora</span>':''}
        </div>
      </div>
      <div class="b-check">✓</div>
    </div>`;
  }).join('');

  /* long-press to edit */
  document.querySelectorAll('.block').forEach(el => {
    let t;
    el.addEventListener('touchstart', ()=>{ t=setTimeout(()=>openSheet(+el.dataset.id),600); },{passive:true});
    el.addEventListener('touchend',   ()=>clearTimeout(t));
    el.addEventListener('touchmove',  ()=>clearTimeout(t));
  });

  /* stats */
  const done = blocks.filter(b=>b.done).length;
  const totM = blocks.reduce((a,b)=>a+t2m(b.end)-t2m(b.start),0);
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = blocks.length - done;
  document.getElementById('s-hrs').textContent  = (totM/60).toFixed(1)+'h';
  const pct = blocks.length ? Math.round(done/blocks.length*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('pct').textContent = pct+'%';
}

/* ── TOGGLE ── */
function toggleDone(id) {
  const b = blocks.find(b=>b.id===id);
  if (!b) return;
  b.done = !b.done;
  persist(); render();
  toast(b.done ? '✅ Bloco concluído!' : '↩️ Bloco reaberto');
  if (notifOn) schedAll();
}

/* ── NOTIFICATIONS ── */
function updateNotifUI() {
  const btn = document.getElementById('notif-btn');
  const lbl = document.getElementById('notif-lbl');
  btn.classList.toggle('active', notifOn);
  lbl.textContent = notifOn ? 'Alertas Ativos' : 'Ativar Alertas';
}

async function toggleNotif() {
  if (!('Notification' in window)) { toast('⚠️ Browser não suporta notificações'); return; }
  if (notifOn) {
    notifOn = false;
    localStorage.setItem('rotina_notif','0');
    timers.forEach(clearTimeout); timers=[];
    updateNotifUI(); toast('🔕 Alertas desativados');
    return;
  }
  const p = await Notification.requestPermission();
  if (p === 'granted') {
    notifOn = true;
    localStorage.setItem('rotina_notif','1');
    schedAll(); updateNotifUI();
    toast('🔔 Alertas ativados!');
  } else {
    toast('❌ Permissão negada pelo browser');
  }
}

function schedAll() {
  timers.forEach(clearTimeout); timers=[];
  if (!notifOn || Notification.permission !== 'granted') return;
  const nowMs = Date.now();
  blocks.forEach(b => {
    if (b.done) return;
    const [sh,sm] = b.start.split(':').map(Number);
    const tgt = new Date(); tgt.setHours(sh,sm,0,0);
    const d   = tgt-nowMs;
    if (d > 0 && d < 86400000) {
      const c = cat(b.cat);
      timers.push(setTimeout(() => {
        if (Notification.permission==='granted')
          new Notification(`${c.emoji} ${b.title}`,{
            body: b.desc||`${b.start} – ${b.end}`,
            vibrate:[200,100,200], tag:`b${b.id}`,
          });
      }, d));
    }
  });
}

/* ── MODAL ── */
function buildCats() {
  document.getElementById('cats').innerHTML = CATS.map(c =>
    `<div class="cat-opt${c.id===selCat?' sel':''}" style="background:${c.color}"
          title="${c.label}" onclick="selCatFn('${c.id}')"></div>`
  ).join('');
}
function selCatFn(id) { selCat=id; buildCats(); }

function openSheet(id) {
  editId = id;
  document.getElementById('btn-del').style.display = id ? 'block' : 'none';
  if (id) {
    const b = blocks.find(b=>b.id===id);
    document.getElementById('sheet-title').textContent = 'Editar Bloco';
    document.getElementById('f-title').value  = b.title;
    document.getElementById('f-desc').value   = b.desc;
    document.getElementById('f-start').value  = b.start;
    document.getElementById('f-end').value    = b.end;
    selCat = b.cat;
  } else {
    document.getElementById('sheet-title').textContent = 'Novo Bloco';
    document.getElementById('f-title').value  = '';
    document.getElementById('f-desc').value   = '';
    document.getElementById('f-start').value  = '';
    document.getElementById('f-end').value    = '';
    selCat = 'agencia';
  }
  buildCats();
  document.getElementById('overlay').classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  editId=null;
}
function maybeClose(e) {
  if (e.target===document.getElementById('overlay')) closeSheet();
}

function saveBlock() {
  const title = document.getElementById('f-title').value.trim();
  const desc  = document.getElementById('f-desc').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  if (!title||!start||!end) { toast('⚠️ Preencha título e horários'); return; }
  if (editId) {
    Object.assign(blocks.find(b=>b.id===editId), {title,desc,start,end,cat:selCat});
  } else {
    blocks.push({id:Date.now(),title,desc,start,end,cat:selCat,done:false});
  }
  persist(); render(); closeSheet();
  if (notifOn) schedAll();
  toast('💾 Salvo!');
}

function delBlock() {
  if (!editId||!confirm('Remover este bloco?')) return;
  blocks=blocks.filter(b=>b.id!==editId);
  persist(); render(); closeSheet();
  if (notifOn) schedAll();
}

/* ── iOS INSTALL HINT ── */
function checkInstall() {
  const ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const sa  = window.navigator.standalone;
  if (ios && !sa && !localStorage.getItem('rotina_install')) {
    document.getElementById('install-banner').classList.add('show');
  }
}
function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
  localStorage.setItem('rotina_install','1');
}

/* ── INIT ── */
buildLegend();
setDate();
render();
updateNotifUI();
checkInstall();
if (notifOn && Notification.permission==='granted') schedAll();

setInterval(()=>{ render(); if(notifOn) schedAll(); }, 60000);
</script>
</body>
</html>
